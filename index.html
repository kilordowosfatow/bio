        curY = e.clientY - rect.top - rect.height / 2;
        if (!ticking) { requestAnimationFrame(updateTilt); ticking = true; }
    });
    card.addEventListener('mouseleave', function() {
        hovering = false;
        card.style.transform = 'perspective(' + perspective + 'px) rotateX(0deg) rotateY(0deg)';
    });
    window.addEventListener('resize', function() { rect = card.getBoundingClientRect(); });
})();
</script></body></html>
